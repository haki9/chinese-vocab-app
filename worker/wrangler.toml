name = "wigo-ocr"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# KV cho rate limit — tạo bằng: wrangler kv namespace create RATE_KV
# rồi điền id vào đây
[[kv_namespaces]]
binding = "RATE_KV"
id = "aabd0cd52ed84499946d79210faa47e9"

[vars]
# Origin của app (GitHub Pages). Dev để trống = cho phép localhost.
ALLOWED_ORIGIN = "https://haki9.github.io"
IP_DAILY_LIMIT = "10"
GLOBAL_DAILY_LIMIT = "300"
OCR_DISABLED = "false"
# Sinh "từ ghép hay dùng" + "mẫu câu" cho màn chi tiết từ (5b) — hạn mức riêng, không cần Turnstile
WORD_DETAIL_IP_DAILY_LIMIT = "60"
WORD_DETAIL_GLOBAL_DAILY_LIMIT = "2000"
WORD_DETAIL_DISABLED = "false"

# Secrets (KHÔNG ghi vào file này):
#   wrangler secret put ANTHROPIC_API_KEY
#   wrangler secret put TURNSTILE_SECRET
# Dev local: tạo worker/.dev.vars với 2 dòng ANTHROPIC_API_KEY=... TURNSTILE_SECRET=...
